<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 DIBUJO + MARCO PERSONALIZADO (fiesta) 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Neue', 'Arial', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(145deg, #fff3d6, #ffe4f2);
            position: relative;
            
   border-radius: 10px;
  max-width: 900px;
  margin: 90px auto;
        }

        /* fondo de emojis flotando (siempre visible) */
        .emoji-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            font-size: 3rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            opacity: 0.3;
            animation: flotar 16s infinite alternate;
        }
        .emoji-rain span {
            margin: 30px 20px;
            filter: drop-shadow(0 10px 10px #ffb6c1);
            animation: girar 20s infinite linear;
        }
        @keyframes flotar {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-50px); }
        }
        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Panel de control del marco (visible para el usuario) */
        .marco-control-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 80px;
            padding: 20px 30px;
            margin: 10px 0 20px 0;
            border: 8px solid white;
            box-shadow: 0 0 0 8px #ffd966, 0 20px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 1200px;
            z-index: 20;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .control-group {
            background: #fff0d4;
            padding: 12px 20px;
            border-radius: 50px;
            border: 4px dotted #ff8a8a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-group label {
            font-weight: 900;
            font-size: 1.4rem;
            color: #3f2b15;
            margin-bottom: 8px;
        }

        .control-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-marco {
            padding: 8px 20px;
            border-radius: 40px;
            border: 4px solid white;
            background: #ffd966;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 5px 0 #b46f4a;
        }
        .btn-marco:active { transform: translateY(5px); box-shadow: none; }
        .btn-marco.selected { background: #ffaa5e; box-shadow: 0 0 0 4px #ff4500; }

        .color-input {
            width: 70px;
            height: 50px;
            border: 4px solid white;
            border-radius: 30px;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 30px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            border: 8px solid #ffb347;
            position: relative;
            z-index: 15;
        }

        h1 {
            text-align: center;
            font-size: 3.2rem;
            text-shadow: 4px 4px 0 #ffbe76;
            background: rgba(255, 255, 180, 0.7);
            border-radius: 70px;
            padding: 15px;
            border: 5px dotted white;
        }

        .upload-area {
            border: 8px dashed #ff6f91;
            border-radius: 60px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 200, 0.6);
            margin-bottom: 25px;
        }
        .upload-area:hover { background: #fff2b5; border-color: #ff3b6f; }
        .upload-icon { font-size: 70px; }
        .upload-text { font-size: 2rem; font-weight: 800; }

        .preview-section {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .preview-box {
            flex: 1;
            min-width: 300px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 60px;
            padding: 20px;
            border: 6px solid white;
        }

        .preview-title { font-size: 2rem; font-weight: bold; margin-bottom: 15px; }

        .image-container {
            width: 100%;
            height: 300px;
            border-radius: 40px;
            overflow: hidden;
            background: #ffebd2;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 6px solid #f9d56e;
        }

        .preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* El canvas del resultado tendrá el marco aplicado */
        #resultCanvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 0; /* lo controla el marco dibujado */
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            background: #ffeeb5;
            border-radius: 70px;
            padding: 20px;
            font-size: 2rem;
        }
        .spinner {
            border: 12px solid #ffe0f0;
            border-top: 12px solid #ff6f91;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 25px 0;
        }
        .btn {
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: bold;
            border: 5px solid white;
            box-shadow: 0 8px 0 #b34e4e;
            cursor: pointer;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-convert { background: #ffd966; }
        .btn-download { background: #b0e57c; }
        .btn-reset { background: #a7d0f0; }
        .btn-volver {
            background: #f4acb7;
            padding: 16px 32px;
            border-radius: 60px;
            text-decoration: none;
            color: black;
            font-size: 1.6rem;
            border: 5px solid white;
            box-shadow: 0 8px 0 #b46f7a;
        }

        .slider-container {
            background: rgba(255, 255, 210, 0.8);
            padding: 20px 30px;
            border-radius: 60px;
            border: 8px solid #ffd966;
            margin-bottom: 20px;
        }
        .slider-group { margin-bottom: 15px; }
        .slider-label { font-size: 1.5rem; font-weight: 900; }
        .slider { width: 100%; height: 16px; }
        .slider-value { float: right; background: white; padding: 5px 20px; border-radius: 40px; }
    </style>
</head>
<body>

<!-- Fondo con emojis flotantes (siempre) -->
<div class="emoji-rain">
    <span></span><span>🎈</span>🍬<span>🎉</span><span>🎉</span><span>🎊</span><span>🧁</span><span>🍰</span><span>🎈</span><span></span><span></span>🍬<span>🍬</span><span>🎈</span>
</div>

<!-- PANEL DE CONTROL: EL USUARIO MODIFICA EL MARCO (forma, color, borde) -->
<div class="marco-control-panel">
    <div class="control-group">
        <label>🎨 Forma:</label>
        <div class="control-buttons">
            <button class="btn-marco selected" id="formaCuadrada">Cuadrado</button>
            <button class="btn-marco" id="formaCircular">Círculo</button>
        </div>
    </div>
    <div class="control-group">
        <label>🌈 Fondo marco:</label>
        <input type="color" id="colorFondo" class="color-input" value="#ffd700">
    </div>
    <div class="control-group">
        <label>🖼️ Color borde:</label>
        <input type="color" id="colorBorde" class="color-input" value="#ff6f91">
    </div>
    <div class="control-group">
        <label> Grosor borde:</label>
        <div class="control-buttons">
            <button class="btn-marco" id="bordeFino">fino</button>
            <button class="btn-marco selected" id="bordeMedio">medio</button>
            <button class="btn-marco" id="bordeGrueso">grueso</button>
        </div>
    </div>
</div>

<h1>🎈 FOTO A DIBUJO CON MARCO 🎈</h1>

<div class="container">
    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📸</div>
        <p class="upload-text">sube tu foto (clic aquí)</p>
        <p style="font-size:1.5rem;"> arrastra o haz clic </p>
        <input type="file" id="fileInput" class="file-input" accept="image/*">
    </div>

    <div class="slider-container">
        <div class="slider-group">
            <label class="slider-label">🖍️ intensidad <span class="slider-value" id="intensityValue">8</span></label>
            <input type="range" min="1" max="20" value="8" class="slider" id="intensitySlider">
        </div>
        <div class="slider-group">
            <label class="slider-label">☀️ brillo <span class="slider-value" id="brightnessValue">100</span></label>
            <input type="range" min="0" max="200" value="100" class="slider" id="brightnessSlider">
        </div>
        <div class="slider-group">
            <label class="slider-label">🌓 contraste <span class="slider-value" id="contrastValue">100</span></label>
            <input type="range" min="0" max="200" value="100" class="slider" id="contrastSlider">
        </div>
    </div>

    <div class="preview-section">
        <div class="preview-box">
            <h3 class="preview-title">📷 original</h3>
            <div class="image-container">
                <img id="originalPreview" class="preview-img" src="" alt="original">
                <p id="originalPlaceholder" class="placeholder-text">⬆️ sube foto</p>
            </div>
        </div>
        <div class="preview-box">
            <h3 class="preview-title">🎨 dibujo con marco</h3>
            <div class="image-container" style="background: #ffe5d0;">
                <canvas id="resultCanvas"></canvas>
                <p id="resultPlaceholder" class="placeholder-text">⭐ el dibujo enmarcado aparecerá aquí</p>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>🎨 aplicando marco personalizado... 🎨</p>
    </div>

    <div class="controls">
        <button class="btn btn-convert" id="convertBtn">🖼️ generar dibujo + marco</button>
        <button class="btn btn-download" id="downloadBtn" disabled>⬇️ descargar</button>
        <button class="btn btn-reset" id="resetBtn">🔄 reiniciar</button>
        <a href="iniciopremiumdibujosprincipal.html" class="btn-volver">⬅ volver Atras</a>
    </div>
</div>

<script>
    (function() {
        // Elementos del panel de marco
        const formaCuadrada = document.getElementById('formaCuadrada');
        const formaCircular = document.getElementById('formaCircular');
        const colorFondo = document.getElementById('colorFondo');
        const colorBorde = document.getElementById('colorBorde');
        const bordeFino = document.getElementById('bordeFino');
        const bordeMedio = document.getElementById('bordeMedio');
        const bordeGrueso = document.getElementById('bordeGrueso');

        // Variables de configuración del marco
        let forma = 'cuadrado'; // 'cuadrado' o 'circulo'
        let grosor = 12; // medio por defecto

        // Actualizar botones seleccionados
        formaCuadrada.addEventListener('click', () => {
            forma = 'cuadrado';
            formaCuadrada.classList.add('selected');
            formaCircular.classList.remove('selected');
        });
        formaCircular.addEventListener('click', () => {
            forma = 'circulo';
            formaCircular.classList.add('selected');
            formaCuadrada.classList.remove('selected');
        });

        bordeFino.addEventListener('click', () => {
            grosor = 6;
            bordeFino.classList.add('selected');
            bordeMedio.classList.remove('selected');
            bordeGrueso.classList.remove('selected');
        });
        bordeMedio.addEventListener('click', () => {
            grosor = 12;
            bordeMedio.classList.add('selected');
            bordeFino.classList.remove('selected');
            bordeGrueso.classList.remove('selected');
        });
        bordeGrueso.addEventListener('click', () => {
            grosor = 20;
            bordeGrueso.classList.add('selected');
            bordeMedio.classList.remove('selected');
            bordeFino.classList.remove('selected');
        });

        // ---- lógica de foto a dibujo y aplicación del marco ----
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const originalPreview = document.getElementById('originalPreview');
        const originalPlaceholder = document.getElementById('originalPlaceholder');
        const resultCanvas = document.getElementById('resultCanvas');
        const resultPlaceholder = document.getElementById('resultPlaceholder');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');

        const intensitySlider = document.getElementById('intensitySlider');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const contrastSlider = document.getElementById('contrastSlider');
        const intensityValue = document.getElementById('intensityValue');
        const brightnessValue = document.getElementById('brightnessValue');
        const contrastValue = document.getElementById('contrastValue');

        let originalImage = null;
        let isImageLoaded = false;

        intensitySlider.addEventListener('input', () => { intensityValue.textContent = intensitySlider.value; });
        brightnessSlider.addEventListener('input', () => { brightnessValue.textContent = brightnessSlider.value; });
        contrastSlider.addEventListener('input', () => { contrastValue.textContent = contrastSlider.value; });

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#fff2b5';
            uploadArea.style.borderColor = '#ff3b6f';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = 'rgba(255, 255, 200, 0.6)';
            uploadArea.style.borderColor = '#ff6f91';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(255, 255, 200, 0.6)';
            uploadArea.style.borderColor = '#ff6f91';
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleImageUpload(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleImageUpload(e.target.files[0]);
        });

        function handleImageUpload(file) {
            if (!file.type.match('image.*')) {
                alert('🎈 por favor sube una imagen válida');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImage = new Image();
                originalImage.onload = function() {
                    originalPreview.src = e.target.result;
                    originalPreview.style.display = 'block';
                    originalPlaceholder.style.display = 'none';
                    convertBtn.disabled = false;
                    isImageLoaded = true;
                    resultCanvas.style.display = 'none';
                    resultPlaceholder.style.display = 'block';
                    downloadBtn.disabled = true;
                };
                originalImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Función que genera el dibujo Y le aplica el marco configurado
        convertBtn.addEventListener('click', function() {
            if (!isImageLoaded) { alert('sube una foto'); return; }
            loading.style.display = 'block';
            convertBtn.disabled = true;

            setTimeout(() => {
                try {
                    // 1. crear un canvas temporal para hacer el efecto sketch
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = originalImage.width;
                    tempCanvas.height = originalImage.height;
                    tempCtx.drawImage(originalImage, 0, 0);
                    let imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                    let data = imageData.data;

                    // aplicar efecto sketch (mismo algoritmo)
                    const intensity = parseInt(intensitySlider.value);
                    const originalData = new Uint8ClampedArray(data);
                    for (let y = 1; y < tempCanvas.height - 1; y++) {
                        for (let x = 1; x < tempCanvas.width - 1; x++) {
                            const idx = (y * tempCanvas.width + x) * 4;
                            const topIdx = ((y - 1) * tempCanvas.width + x) * 4;
                            const leftIdx = (y * tempCanvas.width + (x - 1)) * 4;
                            const diffR = Math.abs(originalData[idx] - originalData[topIdx]) + Math.abs(originalData[idx] - originalData[leftIdx]);
                            const diffG = Math.abs(originalData[idx+1] - originalData[topIdx+1]) + Math.abs(originalData[idx+1] - originalData[leftIdx+1]);
                            const diffB = Math.abs(originalData[idx+2] - originalData[topIdx+2]) + Math.abs(originalData[idx+2] - originalData[leftIdx+2]);
                            const diff = (diffR + diffG + diffB) / 3;
                            let sketch = 255 - Math.min(diff * intensity, 255);
                            data[idx] = sketch; data[idx+1] = sketch; data[idx+2] = sketch;
                        }
                    }

                    // brillo y contraste
                    const brightness = parseFloat(brightnessSlider.value) / 100;
                    const contrast = parseFloat(contrastSlider.value) / 100;
                    const factor = (259 * (contrast * 255 + 255)) / (255 * (259 - contrast * 255));
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = factor * (data[i] - 128) + 128;
                        data[i+1] = factor * (data[i+1] - 128) + 128;
                        data[i+2] = factor * (data[i+2] - 128) + 128;
                        data[i] = data[i] * brightness;
                        data[i+1] = data[i+1] * brightness;
                        data[i+2] = data[i+2] * brightness;
                        data[i] = Math.min(255, Math.max(0, data[i]));
                        data[i+1] = Math.min(255, Math.max(0, data[i+1]));
                        data[i+2] = Math.min(255, Math.max(0, data[i+2]));
                    }
                    tempCtx.putImageData(imageData, 0, 0);

                    // 2. Ahora crear el canvas final con el marco
                    const anchoMarco = grosor * 2; // espacio extra para el borde
                    const canvasFinal = resultCanvas;
                    const ctxFinal = canvasFinal.getContext('2d');

                    // Tamaño final: imagen + margen para el marco
                    canvasFinal.width = tempCanvas.width + anchoMarco * 2;
                    canvasFinal.height = tempCanvas.height + anchoMarco * 2;

                    // dibujar fondo del marco (color elegido)
                    ctxFinal.fillStyle = colorFondo.value;
                    ctxFinal.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

                    // dibujar borde (color y grosor)
                    ctxFinal.strokeStyle = colorBorde.value;
                    ctxFinal.lineWidth = grosor * 2; // el borde se reparte a ambos lados, así se ve más definido

                    // dibujar la imagen del sketch en el centro
                    const imgX = anchoMarco;
                    const imgY = anchoMarco;
                    ctxFinal.drawImage(tempCanvas, imgX, imgY);

                    // Aplicar la forma (recorte) al borde y fondo
                    ctxFinal.save();
                    if (forma === 'circulo') {
                        // Recorte circular: el contenido se ve dentro de un círculo
                        ctxFinal.beginPath();
                        const centerX = canvasFinal.width / 2;
                        const centerY = canvasFinal.height / 2;
                        const radius = Math.min(tempCanvas.width, tempCanvas.height) / 2 + anchoMarco - 2;
                        ctxFinal.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                        ctxFinal.clip();
                        // volvemos a dibujar el borde y fondo para que se vea circular? mejor dibujar el borde circular
                        // (ya tenemos fondo, ahora dibujamos el borde circular encima)
                        ctxFinal.strokeStyle = colorBorde.value;
                        ctxFinal.lineWidth = grosor * 2;
                        ctxFinal.beginPath();
                        ctxFinal.arc(centerX, centerY, radius - grosor/2, 0, 2 * Math.PI);
                        ctxFinal.stroke();
                    } else {
                        // cuadrado: dibujar un rectángulo con bordes (el borde se dibuja alrededor)
                        ctxFinal.strokeStyle = colorBorde.value;
                        ctxFinal.lineWidth = grosor * 2;
                        ctxFinal.strokeRect(grosor, grosor, canvasFinal.width - grosor*2, canvasFinal.height - grosor*2);
                    }
                    ctxFinal.restore();

                    // mostramos el canvas final
                    canvasFinal.style.display = 'block';
                    resultPlaceholder.style.display = 'none';
                    downloadBtn.disabled = false;

                } catch (e) {
                    alert('error al generar el dibujo con marco');
                    console.error(e);
                } finally {
                    loading.style.display = 'none';
                    convertBtn.disabled = false;
                }
            }, 50);
        });

        // Descarga directa del canvas con marco
        downloadBtn.addEventListener('click', function() {
            if (resultCanvas.style.display === 'none') { alert('primero genera el dibujo'); return; }
            const link = document.createElement('a');
            link.download = `dibujo-marco-🎂-${Date.now()}.png`;
            link.href = resultCanvas.toDataURL('image/png');
            link.click();
        });

        resetBtn.addEventListener('click', function() {
            fileInput.value = '';
            originalPreview.src = ''; originalPreview.style.display = 'none'; originalPlaceholder.style.display = 'block';
            resultCanvas.style.display = 'none'; resultPlaceholder.style.display = 'block';
            intensitySlider.value = 8; brightnessSlider.value = 100; contrastSlider.value = 100;
            intensityValue.textContent = '8'; brightnessValue.textContent = '100'; contrastValue.textContent = '100';
            convertBtn.disabled = true; downloadBtn.disabled = true;
            originalImage = null; isImageLoaded = false;
        });

        // imagen de ejemplo al cargar
        window.addEventListener('load', function() {
            const sample = new Image();
            sample.onload = function() {
                originalPreview.src = sample.src; originalPreview.style.display = 'block'; originalPlaceholder.style.display = 'none';
                convertBtn.disabled = false; isImageLoaded = true; originalImage = sample;
            };
            sample.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iMzAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmZlZTAwIi8+PGNpcmNsZSBjeD0iMTUwIiBjeT0iMTUwIiByPSI1MCIgZmlsbD0iI2ZmYWI3NyIvPjxjaXJjbGUgY3g9IjI4MCIgY3k9IjE4MCIgcj0iNDAiIGZpbGw9IiNmZjY4NjgiLz48cG9seWdvbiBwb2ludHM9IjcwLDIzMCAzMzAsMjMwIDIwMCwxMjAiIGZpbGw9IiM4NWQ0YjUiLz48dGV4dCB4PSI1MCIgeT0iNzAiIGZpbGw9IndoaXRlIiBmb250LXNpemU9IjUwIj7wn6Sw8J+otPCfqr88L3RleHQ+PC9zdmc+';
        });
    })();
</script>
</body>
