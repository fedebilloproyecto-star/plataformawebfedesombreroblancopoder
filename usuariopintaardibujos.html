<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Pro · Sube foto + Dibuja + Guardado completo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: #1a1f1b;
    text-shadow: 0 0 4px rgba(0,0,0,0.2);

    /* Gradiente suave estilo IA con colores diferentes y claros */
    background: linear-gradient(270deg, #c0f0ff, #ffe0c0, #d0b0ff, #c0ffc0, #ffd0d0);
    background-size: 1200% 1200%;

    /* Animación más lenta */
    animation: gradientSoft 60s ease infinite;
       border-radius: 10px;
  max-width: 1200px;
  margin: 10px auto;
}

@keyframes gradientSoft {
    0% { background-position: 0% 50%; }
    25% { background-position: 25% 50%; }
    50% { background-position: 50% 50%; }
    75% { background-position: 75% 50%; }
    100% { background-position: 0% 50%; }
}
        .estudio-premium {
            max-width: 1600px;
            width: 100%;
            background: #2c332e;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            padding: 24px;
        }

        /* Header moderno */
        .header-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 12px;
        }
        .titulo-estudio {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .titulo-estudio h1 {
            font-weight: 500;
            font-size: 2.0rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e9dcca, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge-pro {
            background: #5b6e5f;
            color: #f0f0e0;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #8f9e8f;
        }

        .stats {
            color: #b2bcab;
            font-size: 0.95rem;
            background: #1f2a21;
            padding: 8px 22px;
            border-radius: 40px;
        }

        /* Grid principal */
        .grid-profesional {
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            gap: 20px;
        }

        /* Panel izquierdo - GALERÍA DE REFERENCIAS */
        .panel-referencias {
            background: #222b24;
            border-radius: 32px;
            padding: 20px 16px;
            box-shadow: inset 0 1px 3px #3f4a3f, 0 8px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            height: fit-content;
        }

        .seccion-referencias h3, .seccion-objetos h3 {
            color: #e2e6d3;
            font-weight: 400;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            margin: 20px 0 16px 8px;
            border-left: 4px solid #7f9a7f;
            padding-left: 14px;
        }

        .carrusel-miniaturas {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
            scrollbar-width: thin;
            scrollbar-color: #6b7c6b #1e261f;
        }
        .carrusel-miniaturas::-webkit-scrollbar {
            width: 6px;
        }
        .carrusel-miniaturas::-webkit-scrollbar-thumb {
            background: #6b7c6b;
            border-radius: 20px;
        }

        .tarjeta-referencia {
            background: #1f291f;
            border-radius: 24px;
            padding: 14px;
            border: 1px solid #3e4d3e;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .tarjeta-referencia:hover {
            background: #263226;
            border-color: #7c9a7c;
            transform: translateX(4px);
        }
        .tarjeta-referencia.seleccionada {
            border: 2px solid #b5d2b5;
            background: #2c3b2c;
            box-shadow: 0 0 0 2px #5a795a;
        }

        .miniatura-canvas {
            width: 100%;
            aspect-ratio: 16/9;
            background: #2d382d;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .miniatura-canvas canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: white;
        }
        .info-referencia {
            display: flex;
            justify-content: space-between;
            color: #ced9c4;
            font-size: 1rem;
            font-weight: 450;
        }
        .tipo-badge {
            background: #3b543b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #d0e0d0;
        }

        /* Panel central - LIENZO PRINCIPAL */
        .panel-lienzo {
            background: #1f2a21;
            border-radius: 36px;
            padding: 20px;
            box-shadow: inset 0 1px 4px #4f5e4f, 0 12px 28px black;
        }

        .barra-herramientas {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            background: #2a372a;
            padding: 12px 22px;
            border-radius: 50px;
        }

        .grupo-herramientas {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .herramienta-btn {
            background: #384538;
            border: none;
            color: #e2ead7;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #5a705a;
        }
        .herramienta-btn.activo {
            background: #5f7b5f;
            border-color: #b1d0b1;
            color: white;
            box-shadow: 0 0 0 2px #9bbd9b;
        }
        .herramienta-btn:hover {
            background: #4a624a;
        }

        .separador-vertical {
            width: 1px;
            height: 30px;
            background: #4f604f;
            margin: 0 8px;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #293529;
            padding: 4px 16px 4px 10px;
            border-radius: 40px;
        }
        #colorPincel {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            border: 2px solid #6f8a6f;
            cursor: pointer;
            background: transparent;
        }
        #tamanioPincel {
            width: 120px;
        }

        .contenedor-lienzo {
            background: #262f26;
            border-radius: 32px;
            padding: 18px;
            box-shadow: inset 0 0 0 1px #516351, 0 6px 12px black;
        }
        #lienzoDibujo {
            display: block;
            width: 100%;
            height: auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            touch-action: none;
        }

        .acciones-lienzo {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 22px;
        }
        .boton-accion {
            background: #384e38;
            border: 1px solid #6e8b6e;
            color: #eaf0e0;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.95rem;
        }
        .boton-accion.primario {
            background: #618561;
            border-color: #9fc09f;
            color: white;
        }
        .boton-accion:hover {
            background: #4f6f4f;
        }

        /* Panel derecho - OBJETOS GEOMÉTRICOS */
        .panel-objetos {
            background: #212a21;
            border-radius: 32px;
            padding: 20px 14px;
            box-shadow: inset 0 1px 2px #475a47;
        }

        .grid-objetos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .objeto-geo {
            background: #293829;
            border-radius: 20px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid #496149;
            cursor: pointer;
            transition: 0.1s;
            color: #d7e3cf;
        }
        .objeto-geo:hover {
            background: #355035;
            border-color: #8bb48b;
            transform: scale(1.02);
        }
        .objeto-geo span {
            font-size: 2rem;
        }
        .objeto-geo small {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .texturas-section {
            margin-top: 30px;
        }
        .texturas-section h4 {
            color: #bdd0b5;
            font-weight: 400;
            margin-bottom: 12px;
        }
        .boton-textura {
            background: #2e412e;
            border: 1px solid #557055;
            color: #e2f0da;
            padding: 8px;
            border-radius: 30px;
            margin-bottom: 8px;
            width: 100%;
            cursor: pointer;
        }

        /* Subir foto */
        .upload-area {
            margin-top: 24px;
            background: #1b2a1b;
            border-radius: 24px;
            padding: 16px;
            border: 2px dashed #5f7b5f;
        }
        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #b8d0b0;
            cursor: pointer;
        }
        #uploadFoto {
            display: none;
        }
        #quitarFoto {
            margin-top: 12px;
            width: 100%;
            background: #4a3a3a;
            border: 1px solid #a06b6b;
            color: #ffd7d7;
        }
      
/* Botón mediano, moderno y redondeado */
.back-button {
    display: inline-block;
    padding: 10px 20px;       /* tamaño mediano */
    font-size: 16px;           /* letra legible */
    color: #fff;               /* texto blanco */
    text-decoration: none;     /* quitar subrayado */
    border-radius: 6px;        /* esquinas suaves */
    font-family: sans-serif;   /* fuente moderna */
    cursor: pointer;
    animation: colorChange 6s infinite alternate; /* animación de colores */
    transition: transform 0.2s ease;             /* efecto al pasar el cursor */
}

/* Efecto hover */
.back-button:hover {
    transform: scale(1.05);
}

/* Efecto click */
.back-button:active {
    transform: scale(0.98);
}

/* Animación de cambio de colores */
@keyframes colorChange {
    0%   { background-color: #007BFF; }  /* azul */
    25%  { background-color: #28a745; }  /* verde */
    50%  { background-color: #dc3545; }  /* rojo */
    75%  { background-color: #fd7e14; }  /* naranja */
    100% { background-color: #6f42c1; }  /* morado */
}
    </style>
</head>
<body>
  
    <div class="estudio-premium">
        <div class="header-premium">
            <div class="titulo-estudio">
                <h1>⚫ foto + geometría + paisajes</h1>
                <span class="badge-pro">pro estudio</span>
            </div>
            <div class="stats" id="estadoHerramienta">📸 sube tu foto · 8 pinceles</div>
        </div>

        <!-- Grid de 3 columnas -->
        <div class="grid-profesional">
            <!-- PANEL IZQUIERDO: Paisajes y referencias + SUBIR FOTO -->
            <div class="panel-referencias">
                <div class="seccion-referencias">
                    <h3>🏞️ PAISAJES CLÁSICOS</h3>
                    <div class="carrusel-miniaturas" id="listaPaisajes"></div>
                </div>
                <div class="seccion-referencias">
                    <h3>🧊 NATURALEZA GEOMÉTRICA</h3>
                    <div class="carrusel-miniaturas" id="listaGeometricos"></div>
                </div>
                
                <!-- NUEVO: Área para subir foto -->
                <div class="upload-area">
                    <label for="uploadFoto" class="upload-label">
                        <span style="font-size:2rem;">📷</span>
                        <span>Haz clic para subir una foto</span>
                        <span style="font-size:0.8rem;">(se pondrá como fondo)</span>
                    </label>
                    <input type="file" id="uploadFoto" accept="image/*">
                    <button class="boton-textura" id="quitarFoto">🗑️ Quitar foto del fondo</button>
                </div>
            </div>

            <!-- PANEL CENTRAL: Lienzo -->
            <div class="panel-lienzo">
                <div class="barra-herramientas">
                    <div class="grupo-herramientas">
                        <button class="herramienta-btn activo" data-herramienta="dibujar" id="btnDibujar">🎨 Dibujar</button>
                        <button class="herramienta-btn" data-herramienta="linea" id="btnLinea">📏 Línea</button>
                        <button class="herramienta-btn" data-herramienta="rectangulo" id="btnRect">🔲 Rectángulo</button>
                        <button class="herramienta-btn" data-herramienta="circulo" id="btnCirculo">⚪ Círculo</button>
                        <button class="herramienta-btn" data-herramienta="triangulo" id="btnTriangulo">🔺 Triángulo</button>
                        <button class="herramienta-btn" data-herramienta="poligono" id="btnPoligono">⬟ Polígono</button>
                    </div>
                    <div class="separador-vertical"></div>
                    <div class="grupo-herramientas">
                        <div class="color-picker-wrapper">
                            <input type="color" id="colorPincel" value="#446644">
                            <span style="color:#cfddcf;">|</span>
                            <input type="range" id="tamanioPincel" min="1" max="50" value="8" step="1">
                            <span id="tamanioValor" style="color:#cedace; min-width:30px;">8</span>
                        </div>
                        <select id="tipoPincel" style="background:#2e3b2e; color:#e0ecd0; border-radius:40px; padding:8px 20px; border:1px solid #627962; width:180px;">
                            <option value="normal">✒️ Clásico (sólido)</option>
                            <option value="acuarela" selected>💧 Acuarela (transparente)</option>
                            <option value="carboncillo">🖤 Carboncillo (difuso)</option>
                            <option value="puntillismo">🔴 Puntillismo (puntos)</option>
                            <option value="espatula">🗡️ Espátula (grueso)</option>
                            <option value="caligrafico">✍️ Caligráfico (variable)</option>
                            <option value="aire">🌬️ Aerógrafo (suave)</option>
                            <option value="textura">🧽 Textura esponja</option>
                        </select>
                    </div>
                </div>

                <div class="contenedor-lienzo">
                    <canvas id="lienzoDibujo" width="900" height="550"></canvas>
                </div>

                <div class="acciones-lienzo">
                    <button class="boton-accion" id="limpiarLienzo">🧽 Limpiar todo</button>
                    <button class="boton-accion primario" id="guardarPNG">💾 Guardar obra COMPLETA</button>
                    <button class="boton-accion" id="guardarSVG">⬇️ Exportar (PNG backup)</button>
                     <a href="bievenidospremium.html" class="back-button">Volver Atras</a> 
                </div>
            </div>

            <!-- PANEL DERECHO: Objetos geométricos y texturas -->
            <div class="panel-objetos">
                <h3 style="color:#e1efd5; margin-bottom:20px;">📐 OBJETOS 3D / GEOMÉTRICOS</h3>
                <div class="grid-objetos" id="objetosGeo">
                    <!-- Se llena con JS -->
                </div>

                <div class="texturas-section">
                    <h4>🎨 TEXTURAS RÁPIDAS</h4>
                    <button class="boton-textura" id="texturaLienzo">🧵 Lienzo</button>
                    <button class="boton-textura" id="texturaMetal">⚙️ Metal</button>
                    <button class="boton-textura" id="texturaMadera">🪵 Madera</button>
                    <button class="boton-textura" id="texturaMarmol">🗿 Mármol</button>
                </div>

                <div style="margin-top: 30px;">
                    <h4 style="color:#c0d6b8;">🖼️ OBJETOS PROFESIONALES</h4>
                    <div style="display:flex; flex-direction: column; gap:8px; margin-top:12px;">
                        <button class="boton-textura" id="objetoPiramide">🔺 Pirámide (dorada)</button>
                        <button class="boton-textura" id="objetoCubo">🧊 Cubo (isométrico)</button>
                        <button class="boton-textura" id="objetoEsfera">🌐 Esfera (reflectante)</button>
                        <button class="boton-textura" id="objetoCilindro">🥫 Cilindro (metal)</button>
                        <button class="boton-textura" id="objetoCono">🎩 Cono (sombrero)</button>
                        <button class="boton-textura" id="objetoToro">🍩 Toro (donut glaseado)</button>
                        <button class="boton-textura" id="objetoIcosaedro">🎲 Icosaedro</button>
                        <button class="boton-textura" id="objetoRombo">💎 Romboedro</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ----- HERRAMIENTAS Y ESTADO -----
            const canvas = document.getElementById('lienzoDibujo');
            const ctx = canvas.getContext('2d');
            
            // Estado herramientas
            let herramientaActiva = 'dibujar'; 
            let color = document.getElementById('colorPincel').value;
            let tamanio = parseInt(document.getElementById('tamanioPincel').value);
            let pincelActivo = document.getElementById('tipoPincel').value;
            
            // Dibujo a mano alzada
            let dibujando = false;
            let ultimoX = 0, ultimoY = 0;

            // Para figuras (coordenadas inicio)
            let inicioX = 0, inicioY = 0;
            let dibujandoFigura = false;

            // Foto de fondo
            let fondoImagen = null; // almacena el ImageBitmap o HTMLImageElement

            // Actualizar UI
            document.getElementById('tamanioPincel').addEventListener('input', (e) => {
                tamanio = parseInt(e.target.value);
                document.getElementById('tamanioValor').innerText = tamanio;
            });
            document.getElementById('colorPincel').addEventListener('input', (e) => { color = e.target.value; });
            document.getElementById('tipoPincel').addEventListener('change', (e) => { pincelActivo = e.target.value; });

            // Botones herramientas
            function setHerramienta(herramienta) {
                herramientaActiva = herramienta;
                document.querySelectorAll('.herramienta-btn').forEach(btn => btn.classList.remove('activo'));
                if (herramienta === 'dibujar') document.getElementById('btnDibujar').classList.add('activo');
                if (herramienta === 'linea') document.getElementById('btnLinea').classList.add('activo');
                if (herramienta === 'rectangulo') document.getElementById('btnRect').classList.add('activo');
                if (herramienta === 'circulo') document.getElementById('btnCirculo').classList.add('activo');
                if (herramienta === 'triangulo') document.getElementById('btnTriangulo').classList.add('activo');
                if (herramienta === 'poligono') document.getElementById('btnPoligono').classList.add('activo');
                document.getElementById('estadoHerramienta').innerHTML = `🛠️ ${herramienta} · ${pincelActivo}`;
            }

            document.getElementById('btnDibujar').addEventListener('click', () => setHerramienta('dibujar'));
            document.getElementById('btnLinea').addEventListener('click', () => setHerramienta('linea'));
            document.getElementById('btnRect').addEventListener('click', () => setHerramienta('rectangulo'));
            document.getElementById('btnCirculo').addEventListener('click', () => setHerramienta('circulo'));
            document.getElementById('btnTriangulo').addEventListener('click', () => setHerramienta('triangulo'));
            document.getElementById('btnPoligono').addEventListener('click', () => setHerramienta('poligono'));

            // ----- REFERENCIAS (PAISAJES Y GEOMÉTRICOS) -----
            const referenciasPaisajes = [
                { nombre: 'Montañas con lago', tipo: 'paisaje', dibujar: (ctx, w, h) => {
                    const grad = ctx.createLinearGradient(0,0,0,h);
                    grad.addColorStop(0,'#aac7cf'); grad.addColorStop(0.6,'#d5dad0');
                    ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
                    ctx.fillStyle='#6a8168'; ctx.beginPath(); ctx.moveTo(0,h*0.6); ctx.lineTo(w*0.3,h*0.2); ctx.lineTo(w*0.7,h*0.3); ctx.lineTo(w,h*0.15); ctx.lineTo(w,h*0.6); ctx.fill();
                    ctx.fillStyle='#336633'; ctx.beginPath(); ctx.arc(w*0.2,h*0.7,20,0,Math.PI*2); ctx.fill();
                }},
                { nombre: 'Atardecer geométrico', tipo: 'abstracto', dibujar: (ctx, w, h) => {
                    ctx.fillStyle='#FAA275'; ctx.fillRect(0,0,w,h);
                    for(let i=0;i<5;i++){ ctx.fillStyle=`hsl(${20+i*10},70%,60%)`; ctx.beginPath(); ctx.rect(w*i/6, h*0.5, w/8, h*0.3); ctx.fill(); }
                }},
                { nombre: 'Bosque de conos', tipo: 'geométrico', dibujar: (ctx, w, h) => {
                    ctx.fillStyle='#d4c9a6'; ctx.fillRect(0,0,w,h);
                    for(let i=1;i<6;i++){ 
                        ctx.fillStyle='#487548'; 
                        ctx.beginPath(); 
                        ctx.moveTo(w*i/7, h*0.7); 
                        ctx.lineTo(w*i/7-20, h*0.5); 
                        ctx.lineTo(w*i/7+20, h*0.5); 
                        ctx.fill(); 
                    }
                }}
            ];

            const referenciasGeometricas = [
                { nombre: 'Cubo isométrico', tipo: '3D', dibujar: (ctx, w, h) => {
                    ctx.fillStyle='#C0A080'; ctx.fillRect(w*0.3,h*0.4,60,40);
                    ctx.fillStyle='#A08060'; ctx.beginPath(); ctx.moveTo(w*0.3+60,h*0.4); ctx.lineTo(w*0.3+80,h*0.3); ctx.lineTo(w*0.3+80,h*0.3+40); ctx.lineTo(w*0.3+60,h*0.4+40); ctx.fill();
                }},
                { nombre: 'Esferas sombreadas', tipo: '3D', dibujar: (ctx, w, h) => {
                    const grad = ctx.createRadialGradient(w*0.4,h*0.5,10,w*0.4,h*0.5,40);
                    grad.addColorStop(0,'#ddd'); grad.addColorStop(1,'#666');
                    ctx.beginPath(); ctx.arc(w*0.4,h*0.5,30,0,2*Math.PI); ctx.fillStyle=grad; ctx.fill();
                }},
                { nombre: 'Poliedro', tipo: 'geométrico', dibujar: (ctx, w, h) => {
                    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.3); ctx.lineTo(w*0.7,h*0.4); ctx.lineTo(w*0.6,h*0.6); ctx.lineTo(w*0.4,h*0.6); ctx.lineTo(w*0.3,h*0.4); ctx.closePath(); ctx.fillStyle='#9BAF9B'; ctx.fill();
                }}
            ];

            function cargarMiniaturas(containerId, lista, tipoClase) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                lista.forEach((ref, idx) => {
                    const card = document.createElement('div');
                    card.className = 'tarjeta-referencia';
                    const miniDiv = document.createElement('div');
                    miniDiv.className = 'miniatura-canvas';
                    const miniCanvas = document.createElement('canvas');
                    miniCanvas.width = 180; miniCanvas.height = 120;
                    miniDiv.appendChild(miniCanvas);
                    const info = document.createElement('div');
                    info.className = 'info-referencia';
                    info.innerHTML = `<span>${ref.nombre}</span><span class="tipo-badge">${ref.tipo}</span>`;
                    card.appendChild(miniDiv); card.appendChild(info);
                    
                    const miniCtx = miniCanvas.getContext('2d');
                    miniCtx.fillStyle = '#ffffff'; miniCtx.fillRect(0,0,180,120);
                    ref.dibujar(miniCtx, 180, 120);

                    card.addEventListener('click', () => {
                        // Al hacer clic, se sobrepone la referencia respetando la foto si existe
                        ctx.clearRect(0,0,canvas.width, canvas.height);
                        // Redibujar foto primero si existe
                        if (fondoImagen) {
                            ctx.drawImage(fondoImagen, 0, 0, canvas.width, canvas.height);
                        } else {
                            ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
                        }
                        ctx.globalAlpha = 0.35;
                        ref.dibujar(ctx, canvas.width, canvas.height);
                        ctx.globalAlpha = 1.0;
                        document.querySelectorAll('.tarjeta-referencia').forEach(c => c.classList.remove('seleccionada'));
                        card.classList.add('seleccionada');
                    });
                    container.appendChild(card);
                });
            }

            cargarMiniaturas('listaPaisajes', referenciasPaisajes);
            cargarMiniaturas('listaGeometricos', referenciasGeometricas);

            // ----- SUBIR FOTO (fondo) -----
            const inputFoto = document.getElementById('uploadFoto');
            inputFoto.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        fondoImagen = img;
                        // Limpiar y dibujar imagen en el fondo
                        ctx.clearRect(0,0,canvas.width,canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        // Nota: los dibujos previos se pierden (como si se empezara de nuevo con la foto)
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });

            // Quitar foto
            document.getElementById('quitarFoto').addEventListener('click', () => {
                fondoImagen = null;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
                inputFoto.value = ''; // reset input
            });

            // ----- OBJETOS GEOMÉTRICOS PARA INSERTAR (botones) -----
            const objetosGeo = [
                { nombre: 'Cubo', icono: '🧊', accion: 'cubo' },
                { nombre: 'Esfera', icono: '⚪', accion: 'esfera' },
                { nombre: 'Pirámide', icono: '🔺', accion: 'piramide' },
                { nombre: 'Cilindro', icono: '🥫', accion: 'cilindro' },
                { nombre: 'Cono', icono: '🎩', accion: 'cono' },
                { nombre: 'Toroide', icono: '🍩', accion: 'toro' },
                { nombre: 'Icosaedro', icono: '🎲', accion: 'ico' },
                { nombre: 'Romboedro', icono: '💎', accion: 'rombo' }
            ];

            const gridObjetos = document.getElementById('objetosGeo');
            gridObjetos.innerHTML = '';
            objetosGeo.forEach(obj => {
                const btn = document.createElement('div');
                btn.className = 'objeto-geo';
                btn.innerHTML = `<span>${obj.icono}</span><small>${obj.nombre}</small>`;
                btn.addEventListener('click', () => {
                    const x = canvas.width/2, y = canvas.height/2;
                    ctx.fillStyle = color;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = tamanio;
                    if (obj.accion === 'cubo') {
                        ctx.fillRect(x-40, y-40, 80, 80);
                        ctx.strokeRect(x-40, y-40, 80, 80);
                    } else if (obj.accion === 'esfera') {
                        ctx.beginPath(); ctx.arc(x, y, 45, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
                    } else if (obj.accion === 'piramide') {
                        ctx.beginPath(); ctx.moveTo(x, y-50); ctx.lineTo(x-40, y+30); ctx.lineTo(x+40, y+30); ctx.closePath(); ctx.fill(); ctx.stroke();
                    } else if (obj.accion === 'cilindro') {
                        ctx.beginPath(); ctx.ellipse(x, y-25, 40, 15, 0, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
                        ctx.beginPath(); ctx.ellipse(x, y+25, 40, 15, 0, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x-40, y-25); ctx.lineTo(x-40, y+25); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x+40, y-25); ctx.lineTo(x+40, y+25); ctx.stroke();
                    } else if (obj.accion === 'cono') {
                        ctx.beginPath(); ctx.moveTo(x-40, y+30); ctx.lineTo(x+40, y+30); ctx.lineTo(x, y-40); ctx.closePath(); ctx.fill(); ctx.stroke();
                    } else if (obj.accion === 'toro') {
                        ctx.beginPath(); ctx.arc(x, y, 45, 0, 2*Math.PI); ctx.fillStyle = '#d2691e'; ctx.fill(); ctx.stroke();
                        ctx.beginPath(); ctx.arc(x, y, 20, 0, 2*Math.PI); ctx.fillStyle = '#f5deb3'; ctx.fill(); ctx.stroke();
                    } else if (obj.accion === 'ico') {
                        ctx.beginPath(); for(let i=0;i<5;i++){ let ang = i*2*Math.PI/5; let xv = x+40*Math.sin(ang); let yv = y-40*Math.cos(ang); if(i===0) ctx.moveTo(xv,yv); else ctx.lineTo(xv,yv); } ctx.closePath(); ctx.fill(); ctx.stroke();
                    } else {
                        ctx.fillRect(x-30, y-30, 60, 60);
                    }
                });
                gridObjetos.appendChild(btn);
            });

            // ----- TEXTURAS (simuladas) -----
            function aplicarTextura(tipo) {
                ctx.globalCompositeOperation = 'multiply';
                for (let i=0; i<200; i++) {
                    if (tipo === 'lienzo') ctx.fillStyle = '#b0a09030';
                    else if (tipo === 'metal') ctx.fillStyle = '#8080a030';
                    else if (tipo === 'madera') ctx.fillStyle = '#a0522d40';
                    else if (tipo === 'marmol') ctx.fillStyle = '#aaaaaa30';
                    ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*10+2, 0, 2*Math.PI);
                    ctx.fill();
                }
                ctx.globalCompositeOperation = 'source-over';
            }
            document.getElementById('texturaLienzo').addEventListener('click', ()=>aplicarTextura('lienzo'));
            document.getElementById('texturaMetal').addEventListener('click', ()=>aplicarTextura('metal'));
            document.getElementById('texturaMadera').addEventListener('click', ()=>aplicarTextura('madera'));
            document.getElementById('texturaMarmol').addEventListener('click', ()=>aplicarTextura('marmol'));

            // Botones objetos profesionales
            document.getElementById('objetoPiramide').addEventListener('click', ()=>{
                ctx.fillStyle = color; ctx.strokeStyle = '#f0e68c'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(300,180); ctx.lineTo(200,300); ctx.lineTo(400,300); ctx.closePath(); ctx.fill(); ctx.stroke();
            });
            document.getElementById('objetoCubo').addEventListener('click', ()=>{
                ctx.fillStyle = color; ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
                ctx.fillRect(280,200,120,100); ctx.strokeRect(280,200,120,100);
                ctx.beginPath(); ctx.moveTo(280,200); ctx.lineTo(260,180); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(400,200); ctx.lineTo(420,180); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(400,300); ctx.lineTo(420,280); ctx.stroke();
            });
            document.getElementById('objetoEsfera').addEventListener('click', ()=>{
                const grad = ctx.createRadialGradient(400,280,10,400,280,70);
                grad.addColorStop(0,'#fff'); grad.addColorStop(0.6,color); grad.addColorStop(1,'#222');
                ctx.beginPath(); ctx.arc(400,280,60,0,2*Math.PI); ctx.fillStyle=grad; ctx.fill(); ctx.stroke();
            });
            document.getElementById('objetoCilindro').addEventListener('click', ()=>{
                ctx.fillStyle=color; ctx.strokeStyle='#aaa';
                ctx.beginPath(); ctx.ellipse(350,200,70,20,0,0,2*Math.PI); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(350,350,70,20,0,0,2*Math.PI); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(280,200); ctx.lineTo(280,350); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(420,200); ctx.lineTo(420,350); ctx.stroke();
            });
            document.getElementById('objetoCono').addEventListener('click', ()=>{
                ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(300,350); ctx.lineTo(500,350); ctx.lineTo(400,180); ctx.closePath(); ctx.fill(); ctx.stroke();
            });
            document.getElementById('objetoToro').addEventListener('click', ()=>{
                ctx.fillStyle='#d2a679'; ctx.beginPath(); ctx.arc(400,280,70,0,2*Math.PI); ctx.fill(); ctx.stroke();
                ctx.fillStyle='#ffe4c4'; ctx.beginPath(); ctx.arc(400,280,35,0,2*Math.PI); ctx.fill(); ctx.stroke();
                ctx.fillStyle='#f4a460'; ctx.beginPath(); ctx.arc(400,200,12,0,2*Math.PI); ctx.fill();
            });
            document.getElementById('objetoIcosaedro').addEventListener('click', ()=>{
                ctx.fillStyle=color; ctx.beginPath(); for(let i=0;i<5;i++){ let a = i*2*Math.PI/5; let xv = 400+50*Math.sin(a); let yv = 280-50*Math.cos(a); if(i===0) ctx.moveTo(xv,yv); else ctx.lineTo(xv,yv); } ctx.closePath(); ctx.fill(); ctx.stroke();
            });
            document.getElementById('objetoRombo').addEventListener('click', ()=>{
                ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(400,200); ctx.lineTo(480,280); ctx.lineTo(400,360); ctx.lineTo(320,280); ctx.closePath(); ctx.fill(); ctx.stroke();
            });

            // ----- FUNCIÓN PRINCIPAL DE DIBUJO CON 8 PINCELES -----
            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; e.preventDefault(); }
                else { clientX = e.clientX; clientY = e.clientY; }
                return { x: Math.min(canvas.width-1, Math.max(0, (clientX - rect.left) * scaleX)), y: Math.min(canvas.height-1, Math.max(0, (clientY - rect.top) * scaleY)) };
            }

            function aplicarPincel() {
                ctx.filter = 'none';
                ctx.globalAlpha = 1;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = tamanio;

                switch(pincelActivo) {
                    case 'acuarela':
                        ctx.globalAlpha = 0.3;
                        ctx.filter = 'blur(2px)';
                        ctx.lineWidth = tamanio * 1.2;
                        break;
                    case 'carboncillo':
                        ctx.globalAlpha = 0.8;
                        ctx.filter = 'grayscale(0.6) contrast(1.3) blur(1px)';
                        ctx.lineWidth = tamanio * 1.5;
                        break;
                    case 'puntillismo':
                        ctx.globalAlpha = 0.8;
                        break;
                    case 'espatula':
                        ctx.globalAlpha = 0.7;
                        ctx.filter = 'brightness(1.1) contrast(1.6)';
                        ctx.lineWidth = tamanio * 2.2;
                        break;
                    case 'caligrafico':
                        ctx.globalAlpha = 0.9;
                        ctx.lineCap = 'butt';
                        break;
                    case 'aire':
                        ctx.globalAlpha = 0.15;
                        ctx.filter = 'blur(4px)';
                        ctx.lineWidth = tamanio * 2.5;
                        break;
                    case 'textura':
                        ctx.globalAlpha = 0.5;
                        ctx.filter = 'contrast(1.5)';
                        ctx.lineWidth = tamanio * 1.8;
                        break;
                    default:
                        ctx.globalAlpha = 1;
                        ctx.filter = 'none';
                }
            }

            function dibujarPincel(x1, y1, x2, y2) {
                if (pincelActivo === 'puntillismo') {
                    for (let i = 0; i < 8; i++) {
                        let offsetX = (Math.random() - 0.5) * tamanio * 1.5;
                        let offsetY = (Math.random() - 0.5) * tamanio * 1.5;
                        ctx.beginPath();
                        ctx.arc(x2 + offsetX, y2 + offsetY, tamanio * 0.4, 0, 2 * Math.PI);
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                } else if (pincelActivo === 'caligrafico') {
                    let dx = x2 - x1;
                    let dy = y2 - y1;
                    let angulo = Math.atan2(dy, dx);
                    let anchoVariable = tamanio * (0.5 + 0.5 * Math.abs(Math.sin(angulo)));
                    ctx.lineWidth = anchoVariable;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                } else if (pincelActivo === 'textura') {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.arc(x2 + (Math.random()-0.5)*tamanio, y2 + (Math.random()-0.5)*tamanio, tamanio*0.3, 0, 2*Math.PI);
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                } else {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }

            function handleMouseDown(e) {
                const { x, y } = getCanvasCoords(e);
                if (herramientaActiva === 'dibujar') {
                    dibujando = true;
                    ultimoX = x; ultimoY = y;
                    ctx.beginPath();
                } else {
                    inicioX = x; inicioY = y;
                    dibujandoFigura = true;
                }
            }

            function handleMouseMove(e) {
                if (herramientaActiva === 'dibujar' && dibujando) {
                    const { x, y } = getCanvasCoords(e);
                    aplicarPincel();
                    dibujarPincel(ultimoX, ultimoY, x, y);
                    ultimoX = x; ultimoY = y;
                }
            }

            function handleMouseUp(e) {
                if (!dibujandoFigura && !dibujando) return;
                if (herramientaActiva !== 'dibujar' && dibujandoFigura) {
                    const { x, y } = getCanvasCoords(e);
                    const ancho = x - inicioX;
                    const alto = y - inicioY;
                    ctx.strokeStyle = color;
                    ctx.fillStyle = color + '40';
                    ctx.lineWidth = tamanio;
                    ctx.globalAlpha = 0.8;
                    ctx.filter = 'none';

                    if (herramientaActiva === 'linea') {
                        ctx.beginPath(); ctx.moveTo(inicioX, inicioY); ctx.lineTo(x, y); ctx.stroke();
                    } else if (herramientaActiva === 'rectangulo') {
                        ctx.fillRect(inicioX, inicioY, ancho, alto);
                        ctx.strokeRect(inicioX, inicioY, ancho, alto);
                    } else if (herramientaActiva === 'circulo') {
                        ctx.beginPath(); ctx.ellipse(inicioX + ancho/2, inicioY + alto/2, Math.abs(ancho/2), Math.abs(alto/2), 0, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
                    } else if (herramientaActiva === 'triangulo') {
                        ctx.beginPath(); ctx.moveTo(inicioX, y); ctx.lineTo(x, y); ctx.lineTo((inicioX+x)/2, inicioY); ctx.closePath(); ctx.fill(); ctx.stroke();
                    } else if (herramientaActiva === 'poligono') {
                        ctx.beginPath(); ctx.moveTo(inicioX+ancho/2, inicioY); for (let i=1;i<=5;i++) { let ang = i*2*Math.PI/5; let xv = inicioX+ancho/2 + (ancho/2)*Math.sin(ang); let yv = inicioY+alto/2 - (alto/2)*Math.cos(ang); ctx.lineTo(xv,yv); } ctx.closePath(); ctx.fill(); ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }
                dibujando = false;
                dibujandoFigura = false;
                ctx.filter = 'none';
            }

            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', ()=> { dibujando=false; dibujandoFigura=false; ctx.filter='none'; });
            canvas.addEventListener('touchstart', handleMouseDown, { passive: false });
            canvas.addEventListener('touchmove', handleMouseMove, { passive: false });
            canvas.addEventListener('touchend', handleMouseUp);

            // Limpiar (manteniendo foto si existe)
            document.getElementById('limpiarLienzo').addEventListener('click', ()=>{
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if (fondoImagen) {
                    ctx.drawImage(fondoImagen, 0, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
                }
                ctx.filter = 'none';
            });

            // Guardar obra COMPLETA (foto + dibujos)
            document.getElementById('guardarPNG').addEventListener('click', ()=>{
                const link = document.createElement('a');
                link.download = 'obra_completa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            document.getElementById('guardarSVG').addEventListener('click', ()=>{
                alert('Exportando como PNG (máxima calidad).');
                const link = document.createElement('a');
                link.download = 'obra_backup.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            // Inicializar canvas en blanco
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        })();
    </script>
</body>
</html>
