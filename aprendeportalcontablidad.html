<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Conocimiento</title>
    <style>
    /* ===== VARIABLES Y RESET ===== */
    :root {
      --primary: #ff6b35;
      --secondary: #2d3047;
      --accent: #ff9e1f;
      --dark: #1a1a2e;
      --light: #f8f9fa;
      --text: #333;
      --shadow: 0 10px 30px rgba(0,0,0,0.15);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --border-radius: 10px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }
    
    /* ===== FONDO MEJORADO ===== */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 15% 50%, rgba(255, 107, 53, 0.1) 0%, transparent 20%),
        radial-gradient(circle at 85% 30%, rgba(255, 158, 31, 0.1) 0%, transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(45, 48, 71, 0.1) 0%, transparent 20%),
        linear-gradient(135deg, #f5f7fa 0%, #e4e8f1 50%, #d5dce8 100%);
      z-index: -2;
    }
    
    /* Patrón de fondo sutil */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
        radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.2) 1px, transparent 1px);
      background-size: 50px 50px, 30px 30px;
      z-index: -1;
      opacity: 0.4;
    }
    
    /* ===== ENCABEZADO ===== */
    header {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--dark) 100%);
      color: white;
      text-align: center;
      padding: 60px 20px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      border-radius: 0 0 var(--border-radius) var(--border-radius);
    }
    
    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(255, 107, 53, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 158, 31, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      z-index: 1;
    }
    
    .header-content {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    
    header h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      margin-bottom: 15px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    header p {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      max-width: 700px;
      margin: 0 auto;
      opacity: 0.9;
      font-weight: 300;
    }
    
    /* ===== BOTÓN VOLVER ===== */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--secondary);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
      margin: 30px 20px 0;
      border: 2px solid var(--secondary);
      width: fit-content;
      box-shadow: 0 4px 15px rgba(45, 48, 71, 0.2);
      position: relative;
      z-index: 1;
    }
    
    .back-button:hover {
      background: transparent;
      color: var(--secondary);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(45, 48, 71, 0.3);
    }
    
    /* ===== CONTENEDOR PRINCIPAL ===== */
    .container {
      max-width: 900px;
      width: 100%;
      margin: 90px auto;
      padding: 30px 20px;
    }
    
    .section-title {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    
    .section-title h2 {
      font-size: 2rem;
      color: var(--secondary);
      display: inline-block;
      padding-bottom: 10px;
    }
    
    .section-title h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--accent));
      border-radius: 2px;
    }
    
    /* ===== GRID DE MÓDULOS ===== */
    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
      padding: 30px 20px;
      max-width: 900px;
      margin: 90px auto;
      position: relative;
      z-index: 1;
    }
    
    .module-button {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      height: 100%;
      border-left: 5px solid var(--primary);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      border-right: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .module-button:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      background: rgba(255, 255, 255, 0.95);
    }
    
    .module-number {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 12px 20px;
      border-radius: 0 0 20px 0;
      width: fit-content;
      box-shadow: 0 4px 10px rgba(255, 107, 53, 0.3);
      position: relative;
      z-index: 2;
    }
    
    .module-title {
      padding: 25px;
      flex-grow: 1;
      font-weight: 500;
      line-height: 1.5;
      color: var(--secondary);
      position: relative;
      z-index: 1;
    }
    
    /* ===== BADGE PARA ENLACES EXTERNOS ===== */
    .module-button[target="_blank"]::after {
      content: ' ↗';
      position: absolute;
      top: 15px;
      right: 15px;
      font-weight: bold;
      color: var(--primary);
      font-size: 1.2rem;
      z-index: 3;
    }
    
    /* ===== FOOTER ===== */
    footer {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--dark) 100%);
      color: white;
      text-align: center;
      padding: 30px 20px;
      margin-top: 50px;
      position: relative;
      z-index: 1;
      border-radius: var(--border-radius) var(--border-radius) 0 0;
    }
    
    footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 158, 31, 0.1) 0%, transparent 50%);
      z-index: -1;
    }
    
    .footer-content {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    
    .footer-links a {
      color: white;
      text-decoration: none;
      transition: var(--transition);
    }
    
    .footer-links a:hover {
      color: var(--accent);
    }
    
    .copyright {
      opacity: 0.7;
      font-size: 0.9rem;
      margin-top: 20px;
    }
    
    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .button-container {
        grid-template-columns: 1fr;
        padding: 20px 15px;
        margin: 60px auto;
        gap: 20px;
      }
      
      .back-button {
        margin: 20px 15px 0;
        padding: 10px 20px;
        font-size: 0.9rem;
      }
      
      .footer-links {
        flex-direction: column;
        gap: 10px;
      }
      
      .container {
        margin: 60px auto;
        padding: 20px 15px;
      }
      
      .module-button {
        border-radius: 8px;
      }
      
      .module-title {
        padding: 20px;
        font-size: 0.95rem;
      }
      
      .module-number {
        font-size: 1rem;
        padding: 10px 16px;
      }
      
      header {
        padding: 40px 15px;
        border-radius: 0 0 8px 8px;
      }
      
      footer {
        border-radius: 8px 8px 0 0;
      }
    }
    
    @media (max-width: 480px) {
      .button-container {
        margin: 40px auto;
        padding: 15px 10px;
        gap: 15px;
      }
      
      .container {
        margin: 40px auto;
        padding: 15px 10px;
      }
      
      header h1 {
        font-size: 1.8rem;
      }
      
      header p {
        font-size: 1rem;
      }
      
      .module-title {
        padding: 15px;
        font-size: 0.9rem;
      }
      
      .back-button {
        margin: 15px 10px 0;
        padding: 8px 16px;
        font-size: 0.85rem;
      }
    }
    
    /* ===== ANIMACIONES ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .module-button {
      animation: fadeIn 0.6s ease forwards;
      opacity: 0;
    }

    /* ===== EFECTO DE PARTICULAS ===== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      animation: float 15s infinite linear;
    }
    
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-1000%) rotate(720deg); opacity: 0; }
    }
    
    /* ===== MEJORAS ADICIONALES ===== */
    .module-button:hover .module-number {
      transform: scale(1.05);
      transition: var(--transition);
    }
    
    .module-button:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    
    /* Indicador visual para enlaces externos */
    .module-button[target="_blank"] .module-title::before {
      content: "🔗 ";
      font-size: 0.9em;
      opacity: 0.7;
    }
    
    /* Efecto de brillo al pasar el cursor */
    .module-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.7s;
      z-index: 0;
    }
    
    .module-button:hover::before {
      left: 100%;
    }
    
    /* Efecto de borde sutil en hover */
    .module-button::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: var(--border-radius);
      padding: 2px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .module-button:hover::after {
      opacity: 1;
    }

    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>
    
    <header>

        <!-- Módulos con el nuevo diseño -->

            <span class="module-number">22</span>
            <span class="module-title">Contabilidad parte 1 </span>
        </a>
        <a href="contablidadcalculocosto.html" class="module-button">
            <span class="module-number">23</span>
            <span class="module-title">Contabilidad parte 2 </span>
        </a>
        <a href="ejemplocontable.html" class="module-button">
            <span class="module-number">24</span>
            <span class="module-title">Ejemplos de contabilidad</span>
        </a>
    

    




    </div>
    
   

    <script>
        // Crear partículas de fondo dinámicas
        document.addEventListener('DOMContentLoaded', function() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Tamaño aleatorio
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Posición inicial aleatoria
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                // Duración de animación aleatoria
                const duration = Math.random() * 20 + 10;
                particle.style.animationDuration = `${duration}s`;
                
                // Retraso de animación aleatorio
                const delay = Math.random() * 5;
                particle.style.animationDelay = `${delay}s`;
                
                particlesContainer.appendChild(particle);
            }
        });
    </script>
</body>
