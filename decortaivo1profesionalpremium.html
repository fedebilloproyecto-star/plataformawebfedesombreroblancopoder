<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Interspecies Council · Edición Profesional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #17aae3 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Tarjeta principal profesional */
        .professional-council {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            background-image: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.5), 0 0 0 2px #c0a97a, 0 0 0 5px #2c2c2c;
            padding: 40px 35px;
            border-radius: 20px;
            position: relative;
            transition: all 0.3s;
        }

        /* Sello de distinción */
        .professional-council::before {
            content: "⚜️";
            position: absolute;
            top: -15px;
            right: 50px;
            font-size: 3rem;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
            transform: rotate(15deg);
        }

        /* Encabezado elegante */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #c0a97a;
            padding-bottom: 25px;
            position: relative;
        }

        h1 {
            font-size: 3.2rem;
            letter-spacing: 6px;
            font-weight: 800;
            text-transform: uppercase;
            color: #1e2a3a;
            text-shadow: 3px 3px 0 #c0a97a, 1px 1px 0 #000;
            margin-bottom: 10px;
            font-family: 'Times New Roman', 'Georgia', serif;
        }

        .subhead {
            font-size: 1.3rem;
            color: #2c3e50;
            background: linear-gradient(90deg, transparent, #c0a97a, transparent);
            display: inline-block;
            padding: 8px 40px;
            font-style: italic;
            letter-spacing: 2px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* Área principal de trabajo */
        .work-area {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            background: #ffffff;
            padding: 35px 30px;
            border-radius: 15px;
            border: 2px solid #c0a97a;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03), 0 15px 25px -10px rgba(0,0,0,0.2);
        }

        .left-panel {
            flex: 2;
            min-width: 280px;
        }

        .right-panel {
            flex: 1;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Botón de subida elegante */
        .upload-btn-wrapper {
            position: relative;
            width: 100%;
        }

        .file-label {
            background: linear-gradient(135deg, #2c3e50 0%, #1e2a3a 100%);
            color: #ffffff;
            padding: 20px 25px;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            border-radius: 50px;
            cursor: pointer;
            display: inline-block;
            width: 100%;
            border: 2px solid #c0a97a;
            box-shadow: 0 10px 15px -5px rgba(0,0,0,0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .file-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 20px -5px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        }

        .file-label i {
            margin-right: 10px;
            font-size: 1.5rem;
        }

        input[type="file"] {
            display: none;
        }

        /* Elementos decorativos profesionales */
        .decorative-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0 10px;
            justify-content: center;
        }

        .prof-icon {
            font-size: 2rem;
            background: #f0f0f0;
            padding: 12px 18px;
            border-radius: 15px;
            border: 2px solid #c0a97a;
            color: #2c3e50;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .prof-icon:hover {
            transform: scale(1.1);
            background: #c0a97a;
            color: white;
        }

        .badge {
            background: #c0a97a;
            color: #1e2a3a;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border: 2px solid #2c3e50;
            box-shadow: 0 5px 0 #1e2a3a;
        }

        /* Selector de estilo profesional */
        .style-selector {
            background: #2c3e50;
            padding: 18px;
            border-radius: 50px;
            border: 2px solid #c0a97a;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 0 #1e2a3a;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23c0a97a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .style-selector option {
            background: #ffffff;
            color: #2c3e50;
            padding: 15px;
        }

        /* Botones de acción */
        .action-btn {
            background: #ffffff;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            color: #1e2a3a;
            border: 3px solid #c0a97a;
            box-shadow: 0 8px 0 #8b6f4c;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }

        .action-btn:hover {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b6f4c;
            background: #f8f4e8;
        }

        .download-btn {
            background: #c0a97a;
            border: 3px solid #2c3e50;
            box-shadow: 0 8px 0 #1e2a3a;
            color: #1e2a3a;
            font-size: 1.3rem;
        }

        .download-btn:hover {
            background: #d4bc8c;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1e2a3a;
        }

        /* Contenedor del canvas */
        .canvas-container {
            background: #2c3e50;
            padding: 25px;
            border-radius: 30px;
            border: 4px solid #c0a97a;
            box-shadow: inset 0 0 0 5px #ffffff, 0 20px 30px -10px #000;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
            background: #ffffff;
            border-radius: 15px;
            border: 3px solid #c0a97a;
            box-shadow: 0 0 0 5px #ffffff, 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Pie de página */
        footer {
            margin-top: 30px;
            color: #2c3e50;
            font-size: 1rem;
            text-align: center;
            border-top: 2px solid #c0a97a;
            padding-top: 20px;
            font-family: 'Times New Roman', serif;
            letter-spacing: 2px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Info adicional */
        .info-text {
            text-align: center;
            color: #2c3e50;
            font-weight: 500;
            margin: 10px 0;
            font-size: 0.95rem;
        }

        .gold-text {
            color: #c0a97a;
            font-weight: 800;
        }
        .volver {
  background-color: #3498db;   /* color de fondo */
  color: white;                /* color del texto */
  padding: 12px 25px;          /* espacio interno */
  border: 3px solid #1f5f8b;   /* borde más grande */
  border-radius: 10px;         /* bordes redondeados */
  text-decoration: none;       /* quitar subrayado */
  font-size: 18px;             /* tamaño del texto */
  font-weight: bold;
}

.volver:hover {
  background-color: #1f5f8b;   /* cambia color al pasar el mouse */
}
    </style>
</head>
<body>
<div class="professional-council">
    <div class="header-section">
        <h1>⚜️  SOMBRERO BLANCO ⚜️</h1>
        <div class="subhead">Edición Profesional PREMIUM</div>
    </div>

    <div class="work-area">
        <div class="left-panel">
            <div class="upload-btn-wrapper">
                <label for="file-upload-pro" class="file-label">
                    <i>📸</i> SUBIR FOTOGRAFÍA 
                </label>
                <input type="file" id="file-upload-pro" accept="image/*">
            </div>
            
            <div class="decorative-icons">
                <span class="prof-icon">⚜️</span>
                <span class="prof-icon">👔</span>
                <span class="prof-icon">💼</span>
                <span class="prof-icon">📋</span>
                <span class="prof-icon">🏛️</span>
                <span class="prof-icon">🎯</span>
            </div>
            
            <div class="badge">
                ⭐ ENTRA AL PREMIUM DECORATIVO ⭐
            </div>
            
            <p class="info-text">
                <span class="gold-text">✦</span> ESTILO DECORATIVO <span class="gold-text">✦</span>
            </p>
        </div>
        
        <div class="right-panel">
            <select id="style-picker-pro" class="style-selector">
                <option value="ejecutivo" selected>💼 ESTILO EJECUTIVO</option>
                <option value="diplomatico">⚜️ ESTILO DIPLOMÁTICO</option>
                <option value="corporativo">📊 ESTILO CORPORATIVO</option>
                <option value="ceremonial">🏛️ ESTILO CEREMONIAL</option>
                <option value="moderno">🌟 ESTILO MODERNO</option>
                <option value="clasico">📜 ESTILO CLÁSICO</option>
            </select>
            
            <div class="button-group">
                <button id="random-style-pro" class="action-btn">🎲 ESTILO ALEATORIO</button>
                <button id="download-btn-pro" class="action-btn download-btn">⬇️ DESCARGAR FOTO</button>
                <a href="premiuminiciodecorativoinicio.html" class="volver">Volver a atras</a>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="councilCanvas-pro" width="600" height="400"></canvas>
    </div>
    
 

<script>
    (function() {
        // ================== CONFIGURACIÓN PROFESIONAL ==================
        const canvas = document.getElementById('councilCanvas-pro');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-upload-pro');
        const stylePicker = document.getElementById('style-picker-pro');
        const randomBtn = document.getElementById('random-style-pro');
        const downloadBtn = document.getElementById('download-btn-pro');

        let userImage = null;
        let currentStyle = 'ejecutivo';

        // ================== BIBLIOTECA DE ESTILOS PROFESIONALES ==================
        const professionalDB = {
            ejecutivo: {
                bgGradient: ['#1e2a3a', '#2c3e50'],
                accent: '#c0a97a',
                elements: ['👔', '💼', '📊', '📈', '📋', '✒️', '📌', '🔑'],
                deco: ['⚜️', '📋', '💼'],
                pattern: 'lineas'
            },
            diplomatico: {
                bgGradient: ['#8b6f4c', '#c0a97a'],
                accent: '#ffffff',
                elements: ['⚜️', '📜', '🖋️', '🔱', '🏛️', '⚖️', '📑', '🔖'],
                deco: ['⚜️', '📜', '🏛️'],
                pattern: 'diamantes'
            },
            corporativo: {
                bgGradient: ['#2c3e50', '#34495e'],
                accent: '#ecf0f1',
                elements: ['📊', '📈', '📉', '📋', '📁', '🗂️', '📎', '📏'],
                deco: ['📊', '📈', '📋'],
                pattern: 'cuadros'
            },
            ceremonial: {
                bgGradient: ['#4a2c2c', '#6b4f4f'],
                accent: '#ffd700',
                elements: ['🏛️', '⚜️', '👑', '⭐', '✨', '🔱', '📜', '🏺'],
                deco: ['👑', '⚜️', '🏛️'],
                pattern: 'dorado'
            },
            moderno: {
                bgGradient: ['#2d3e50', '#3498db'],
                accent: '#ffffff',
                elements: ['🌟', '⚡', '💡', '🎯', '📱', '💻', '⚙️', '🔮'],
                deco: ['🌟', '⚡', '🎯'],
                pattern: 'lineas-modernas'
            },
            clasico: {
                bgGradient: ['#3e2c1a', '#5e4a2e'],
                accent: '#d4af37',
                elements: ['📜', '🖋️', '🔑', '🗝️', '📚', '🏺', '⚱️', '📿'],
                deco: ['📜', '🖋️', '📚'],
                pattern: ' pergamino'
            }
        };

        // ================== IMAGEN POR DEFECTO ==================
        function createDefaultImage() {
            const offCanvas = new OffscreenCanvas(200, 200);
            const offCtx = offCanvas.getContext('2d');
            
            // Fondo elegante
            offCtx.fillStyle = '#c0a97a';
            offCtx.fillRect(0, 0, 200, 200);
            
            offCtx.fillStyle = '#1e2a3a';
            offCtx.font = 'bold 60px "Times New Roman", serif';
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            offCtx.fillText('⚜️', 100, 100);
            
            offCtx.font = '20px "Segoe UI", sans-serif';
            offCtx.fillStyle = '#ffffff';
            offCtx.fillText('MIEMBRO', 100, 160);
            
            return offCanvas.transferToImageBitmap();
        }

        let defaultImageBitmap = createDefaultImage();

        // ================== FUNCIÓN PARA DIBUJAR SOMBRERO BLANCO ==================
        function drawWhiteHat(ctx, x, y, size = 45) {
            ctx.save();
            
            // Sombrero de copa blanco elegante
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            // Copa
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.rect(x - size/3, y - size, size*0.7, size*0.8);
            ctx.fill();
            
            // Ala
            ctx.beginPath();
            ctx.ellipse(x, y - size/1.6, size/1.5, size/5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Banda dorada
            ctx.fillStyle = professionalDB[currentStyle]?.accent || '#c0a97a';
            ctx.shadowBlur = 5;
            ctx.fillRect(x - size/4, y - size/1.3, size/2, size/15);
            
            // Hebilla o adorno
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(x, y - size/1.3, size/12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // ================== FUNCIÓN PARA DIBUJAR PATRONES ==================
        function drawPattern(ctx, type, width, height) {
            ctx.save();
            ctx.globalAlpha = 0.1;
            
            if (type === 'lineas') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                for (let i = 0; i < width; i += 30) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, height);
                    ctx.stroke();
                }
            } else if (type === 'diamantes') {
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < width; i += 40) {
                    for (let j = 0; j < height; j += 40) {
                        ctx.save();
                        ctx.translate(i, j);
                        ctx.rotate(45 * Math.PI / 180);
                        ctx.fillRect(-10, -10, 20, 20);
                        ctx.restore();
                    }
                }
            } else if (type === 'cuadros') {
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < width; i += 50) {
                    for (let j = 0; j < height; j += 50) {
                        ctx.fillRect(i, j, 25, 25);
                    }
                }
            } else if (type === 'dorado') {
                ctx.fillStyle = '#ffd700';
                for (let i = 0; i < width; i += 60) {
                    for (let j = 0; j < height; j += 60) {
                        ctx.beginPath();
                        ctx.arc(i, j, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            ctx.restore();
        }

        // ================== FUNCIÓN PRINCIPAL DE RENDERIZADO ==================
        function renderProfessional() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const styleData = professionalDB[currentStyle] || professionalDB.ejecutivo;
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, styleData.bgGradient[0]);
            gradient.addColorStop(1, styleData.bgGradient[1]);
            
            // Fondo principal
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Patrón decorativo
            drawPattern(ctx, styleData.pattern, canvas.width, canvas.height);

            // Marco exterior elegante
            ctx.strokeStyle = styleData.accent;
            ctx.lineWidth = 8;
            ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
            
            // Segundo marco
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 10]);
            ctx.strokeRect(25, 25, canvas.width-50, canvas.height-50);
            ctx.setLineDash([]);

            // Elementos decorativos alrededor
            ctx.font = '40px "Segoe UI Emoji", "Arial", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Posiciones para los elementos (esquinas y laterales)
            const positions = [
                { x: 50, y: 50 },
                { x: canvas.width-50, y: 50 },
                { x: 50, y: canvas.height-50 },
                { x: canvas.width-50, y: canvas.height-50 },
                { x: canvas.width/2, y: 50 },
                { x: canvas.width/2, y: canvas.height-50 },
                { x: 50, y: canvas.height/2 },
                { x: canvas.width-50, y: canvas.height/2 }
            ];

            positions.forEach((pos, index) => {
                const element = styleData.elements[index % styleData.elements.length];
                
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
                // Dibujar elemento
                ctx.fillStyle = '#ffffff';
                ctx.fillText(element, pos.x, pos.y);
                
                // Dibujar sombrero blanco encima de cada elemento
                drawWhiteHat(ctx, pos.x, pos.y - 20, 25);
                
                ctx.restore();
            });

            // Decoración central inferior
            ctx.font = '35px "Segoe UI Emoji"';
            styleData.deco.forEach((ch, idx) => {
                ctx.fillStyle = styleData.accent;
                ctx.fillText(ch, 80 + idx*70, 320);
                ctx.fillText(ch, canvas.width-100 - idx*70, 320);
            });

            // ===== FOTO CENTRAL CON MARCO ELEGANTE =====
            const imgToDraw = userImage || defaultImageBitmap;
            
            if (imgToDraw) {
                ctx.save();
                
                // Sombra para el marco
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 5;
                
                // Marco exterior
                ctx.fillStyle = styleData.accent;
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, canvas.height/2, 130, 130, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Marco interior blanco
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, canvas.height/2, 120, 120, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Clip circular para la imagen
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, canvas.height/2, 110, 110, 0, 0, Math.PI * 2);
                ctx.clip();

                try {
                    if (imgToDraw instanceof ImageBitmap) {
                        ctx.drawImage(imgToDraw, canvas.width/2-110, canvas.height/2-110, 220, 220);
                    } else if (imgToDraw instanceof HTMLImageElement) {
                        ctx.drawImage(imgToDraw, canvas.width/2-110, canvas.height/2-110, 220, 220);
                    }
                } catch (e) {
                    // Si hay error, mostramos un fondo elegante
                    ctx.fillStyle = '#f0f0f0';
                    ctx.fillRect(canvas.width/2-110, canvas.height/2-110, 220, 220);
                    
                    ctx.font = 'bold 30px "Times New Roman"';
                    ctx.fillStyle = styleData.bgGradient[0];
                    ctx.textAlign = 'center';
                    ctx.fillText('⚜️', canvas.width/2, canvas.height/2-20);
                    ctx.font = '20px "Segoe UI"';
                    ctx.fillText('MIEMBRO', canvas.width/2, canvas.height/2+30);
                }

                ctx.restore(); // Quitar clip
                
                // Borde decorativo del marco
                ctx.shadowBlur = 5;
                ctx.strokeStyle = styleData.bgGradient[0];
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 8]);
                ctx.beginPath();
                ctx.ellipse(canvas.width/2, canvas.height/2, 115, 115, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // SOMBRERO GRANDE EN LA FOTO PRINCIPAL
                drawWhiteHat(ctx, canvas.width/2, canvas.height/2 - 90, 70);
                
                ctx.restore(); // Restaurar estado de sombra
            }

            // Título inferior elegante
            ctx.shadowBlur = 0;
            ctx.font = 'bold 16px "Times New Roman", serif';
            ctx.fillStyle = styleData.accent;
            ctx.textAlign = 'right';
           
            
            // Fecha simulada
            ctx.font = '12px "Segoe UI"';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            
        }

        // ================== CARGA DE IMAGEN ==================
        function loadUserImage(file, callback) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    createImageBitmap(img, { 
                        resizeWidth: 400, 
                        resizeHeight: 400, 
                        resizeQuality: 'high' 
                    })
                    .then(bitmap => callback(bitmap))
                    .catch(() => callback(img));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ================== EVENT LISTENERS ==================
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                loadUserImage(e.target.files[0], (bitmap) => {
                    userImage = bitmap;
                    renderProfessional();
                });
            }
            fileInput.value = '';
        });

        stylePicker.addEventListener('change', (e) => {
            currentStyle = e.target.value;
            renderProfessional();
        });

        randomBtn.addEventListener('click', () => {
            const styles = Object.keys(professionalDB);
            const rand = styles[Math.floor(Math.random() * styles.length)];
            stylePicker.value = rand;
            currentStyle = rand;
            renderProfessional();
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `interspecies-council-${currentStyle}-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        });

        // ================== INICIALIZAR ==================
        userImage = defaultImageBitmap;
        renderProfessional();
    })();
</script>
</body>
</html>
